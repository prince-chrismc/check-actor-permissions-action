printWidth: 80
tabWidth: 2
useTabs: false
semi: false
singleQuote: true
quoteProps: as-needed
jsxSingleQuote: false
trailingComma: none
bracketSpacing: true
bracketSameLine: true
arrowParens: always
proseWrap: always
htmlWhitespaceSensitivity: css
endOfLine: lf

plugins:
  - 'prettier-plugin-ignored'

overrides:
  - files:
      - 'dist/**/*'
      - 'lib/**/*'
      - 'node_modules/**/*'
    options:
      parser: 'ignored'
